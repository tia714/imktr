<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SARPRAS FTI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400..900&family=League+Spartan&family=Outfit:wght@400;500;600;700;900&display=swap" rel="stylesheet"> 
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
            extend: {
                "colors": {
                    "surface-container-high": "#edf4ff",
                    "on-primary-fixed": "#001221",
                    "on-tertiary-fixed-variant": "#c80a00",
                    "secondary-fixed-dim": "#ffb01f",
                    "on-secondary-fixed": "#001221",
                    "surface-dim": "#d3e4ff",
                    "secondary": "#ffb01f",
                    "primary-fixed-dim": "#ffb01f",
                    "secondary-container": "#ffb01f",
                    "primary": "#003765",
                    "on-secondary-fixed-variant": "#001221",
                    "on-primary-container": "#ffffff",
                    "tertiary": "#c80a00",
                    "outline": "#737780",
                    "on-background": "#001221",
                    "on-error": "#ffffff",
                    "secondary-fixed": "#ffb01f",
                    "surface-tint": "#003765",
                    "on-tertiary-fixed": "#001221",
                    "on-surface-variant": "#001221",
                    "tertiary-fixed": "#c80a00",
                    "tertiary-container": "#c80a00",
                    "primary-container": "#003765",
                    "surface": "#f7f9ff",
                    "inverse-surface": "#001221",
                    "on-error-container": "#93000a",
                    "tertiary-fixed-dim": "#c80a00",
                    "inverse-primary": "#ffb01f",
                    "surface-variant": "#d3e4ff",
                    "surface-container-low": "#f0f5ff",
                    "on-surface": "#001221",
                    "error": "#ba1a1a",
                    "on-secondary": "#001221",
                    "outline-variant": "#c3c6d0",
                    "on-secondary-container": "#001221",
                    "error-container": "#ffdad6",
                    "surface-container-highest": "#d3e4ff",
                    "inverse-on-surface": "#ffffff",
                    "primary-fixed": "#003765",
                    "on-primary-fixed-variant": "#ffffff",
                    "surface-container": "#e2efff",
                    "surface-bright": "#ffffff",
                    "background": "#ffffff",
                    "surface-container-lowest": "#ffffff",
                    "on-tertiary-container": "#ffffff",
                    "on-primary": "#ffffff",
                    "on-tertiary": "#ffffff"
                },
                "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                },
                "spacing": {
                        "sm": "8px",
                        "md": "16px",
                        "edge-margin": "16px",
                        "lg": "24px",
                        "base": "4px",
                        "xl": "32px",
                        "xs": "4px",
                        "gutter": "12px"
                },
                "fontFamily": {
                        "headline-lg": ["Outfit"],
                        "label-md": ["Alegreya"],
                        "body-md": ["League Spartan"],
                        "headline-lg-mobile": ["Outfit"],
                        "label-sm": ["Alegreya"],
                        "headline-md": ["Outfit"],
                        "body-lg": ["League Spartan"]
                },
                "fontSize": {
                        "headline-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                }
            },
            },
        }
    </script>
</head>

<body class="bg-background text-[#00223d] font-body-md selection:bg-[#eff8ff] selection:text-[#00223d] overflow-x-hidden">
    <main class="pt-4 pb-28 px-edge-margin space-y-6">
        
        <!-- Header: Back Button, Title, Notification Bell -->
        <header class="flex items-center justify-between py-2 relative">
            <a href="home.html" class="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center text-[#00223d] active:scale-95 transition-all">
                <span class="material-symbols-outlined text-xl">arrow_back</span>
            </a>
            <h1 id="page-title" class="text-xl font-bold font-['Outfit'] text-[#00223d] absolute left-1/2 -translate-x-1/2 whitespace-nowrap">
                Rooms & Tools Booking
            </h1>
            <button class="w-10 h-10 rounded-xl bg-gray-50 flex items-center justify-center text-[#00223d] active:scale-95 transition-all relative">
                <span class="material-symbols-outlined text-xl">notifications</span>
                <span class="absolute top-3 right-3 w-1.5 h-1.5 bg-[#b80900] rounded-full"></span>
            </button>
        </header>

        <!-- Toggle: Ruang / Alat -->
        <div class="bg-surface-container-low p-1.5 rounded-xl flex items-center shadow-sm border border-outline-variant">
            <button class="flex-1 py-2.5 px-4 rounded-lg font-['Outfit'] text-label-md transition-all duration-200 bg-primary text-white shadow-sm" id="toggleRuang" onclick="setToggle('ruang')">
                Room
            </button>
            <button class="flex-1 py-2.5 px-4 rounded-lg font-['Outfit'] text-label-md transition-all duration-200 text-on-surface-variant hover:bg-surface-container-high" id="toggleAlat" onclick="setToggle('alat')">
                Tools
            </button>
        </div>

        <!-- Form Container -->
        <div class="bg-white border border-outline-variant/40 rounded-2xl p-5 md:p-8 shadow-sm">
            <form id="formPeminjaman" class="space-y-6">
                <!-- Pilih Ruang / Alat -->
                <div class="flex flex-col gap-2">
                    <label class="font-label-md text-sm font-semibold text-on-surface-variant" id="label-item" for="item">
                        Pilih Ruang 
                    </label>
                    <div class="relative">
                        <select
                            class="w-full appearance-none bg-surface-container-low border border-outline-variant rounded-lg pl-10 pr-10 py-3 font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all cursor-pointer"
                            id="item"
                            required>
                            <option value="">-- Pilih Ruang --</option>
                            <option value="Kelas A">Kelas A</option>
                            <option value="Kelas B">Kelas B</option>
                            <option value="Kelas C">Kelas C</option>
                            <option value="Lab Komputer">Lab Komputer</option>
                            <option value="Auditorium">Auditorium</option>
                        </select>
                        <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-primary" id="icon-item">meeting_room</span>
                        <span class="material-symbols-outlined absolute right-3 top-1/2 -translate-y-1/2 pointer-events-none text-on-surface-variant">expand_more</span>
                    </div>
                </div>

                <!-- Tanggal Peminjaman -->
                <div class="grid grid-cols-1 md:grid-cols-3 gap-4">
                    <div class="flex flex-col gap-2">
                        <label class="font-label-md text-sm font-semibold text-on-surface-variant" for="tanggal">
                            Tanggal Peminjaman
                        </label>
                        <input
                            class="w-full bg-surface-container-low border border-outline-variant rounded-lg p-3 font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                            id="tanggal"
                            type="date"
                            required>
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="font-label-md text-sm font-semibold text-on-surface-variant" for="waktuMulai">
                            Jam Awal Peminjaman
                        </label>
                        <input
                            class="w-full bg-surface-container-low border border-outline-variant rounded-lg p-3 font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                            id="waktuMulai"
                            type="time">
                    </div>
                    <div class="flex flex-col gap-2">
                        <label class="font-label-md text-sm font-semibold text-on-surface-variant" for="waktuSelesai">
                            Jam Selesai Peminjaman
                        </label>
                        <input
                            class="w-full bg-surface-container-low border border-outline-variant rounded-lg p-3 font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all"
                            id="waktuSelesai"
                            type="time">
                    </div>

                </div>

                <!-- Keperluan -->
                <div class="flex flex-col gap-2">
                    <label class="font-label-md text-sm font-semibold text-on-surface-variant" for="keperluan">
                        Keperluan / Keterangan
                    </label>
                    <textarea
                        class="w-full bg-surface-container-low border border-outline-variant rounded-lg p-3 font-body-md text-body-md focus:ring-2 focus:ring-primary focus:border-transparent outline-none transition-all resize-none"
                        id="keperluan"
                        placeholder="Jelaskan keperluan peminjaman, acara, atau detail tambahan..."
                        rows="4"></textarea>
                </div>

                <!-- Submit -->
                <button class="w-full bg-secondary-container hover:bg-secondary-container/90 text-on-secondary-container font-semibold py-4 rounded-xl shadow-md transition-all active:scale-[0.99] duration-150 flex items-center justify-center gap-2 text-base" type="submit">
                <span class="material-symbols-outlined">send</span>
                <span id="submit-text">Submit</span>
            </button>

            </form>
        </div>

        <!-- Result Section -->
        <div id="hasil" class="hidden bg-surface-container-low border border-outline-variant rounded-2xl p-5 shadow-sm"></div>

    </main>

    <!-- Bottom Nav -->
    <nav class="fixed bottom-0 w-full z-50 bg-white border-t border-outline-variant shadow-lg flex justify-around items-center h-16 pb-safe px-2">
        <a href="home.html" class="flex flex-col items-center justify-center text-[#ffd129ff] font-bold transition-all active:scale-90 duration-200">
            <span class="material-symbols-outlined" data-icon="home" style="font-variation-settings: 'FILL' 1;">home</span>
            <span class="font-['Outfit'] text-xs mt-0.5">Home</span>
        </a>
        <a href="calendar.html" class="flex flex-col items-center justify-center text-[#00223d] hover:text-[#00223d]/80 transition-all active:scale-90 duration-200">
            <span class="material-symbols-outlined" data-icon="calendar_month">calendar_month</span>
            <span class="font-['Outfit'] text-xs mt-0.5">Schedule</span>
        </a>
        <!-- Wrapper dengan class 'relative' agar koordinat absolute popup presisi di atas tombol -->
        <div class="relative -mt-8">
            <!-- Tombol Add -->
            <button id="add-btn" class="w-14 h-14 bg-[#00223d] text-white rounded-full flex items-center justify-center shadow-xl border-4 border-white active:scale-90 hover:scale-105 transition-all duration-200">
                <span class="material-symbols-outlined text-2xl transition-transform duration-200" id="add-icon">add</span>
            </button>

            <!-- Popup Menu (Gaya Gelembung Pesan / Tooltip) -->
            <div id="add-menu" class="hide absolute bottom-full left-1/2 -translate-x-1/2 mb-4 bg-white dark:bg-zinc-800 rounded-2xl shadow-[0_10px_35px_-5px_rgba(0,0,0,0.15)] dark:shadow-[0_10px_35px_-5px_rgba(0,0,0,0.3)] border border-gray-100 dark:border-zinc-700/80 p-2 w-56 flex flex-col gap-1 z-50">
                <!-- Segitiga Penunjuk -->
                <div class="popup-arrow bg-white dark:bg-zinc-800"></div>

                <!-- Opsi 1: Pinjam Ruang -->
                <a href="pinjam.html?tab=ruang" class="flex items-center gap-3 px-3 py-2 rounded-xl text-[#00223d] hover:bg-gray-100 dark:hover:bg-zinc-700/60 transition-colors active:scale-98 duration-100">
                    <span class="material-symbols-outlined text-blue-500 dark:text-blue-400 text-xl">meeting_room</span>
                    <span class="text-sm font-medium font-['Outfit']">Pinjam Ruang</span>
                </a>

                <!-- Opsi 2: Pinjam Alat -->
                <a href="pinjam.html?tab=alat" class="flex items-center gap-3 px-3 py-2 rounded-xl text-[#00223d] hover:bg-gray-100 dark:hover:bg-zinc-700/60 transition-colors active:scale-98 duration-100">
                    <span class="material-symbols-outlined text-emerald-500 dark:text-emerald-400 text-xl">construction</span>
                    <span class="text-sm font-medium font-['Outfit']">Pinjam Alat</span>
                </a>

                <!-- Opsi 3: Report Missing Item -->
                <a href="reportlost.html" class="flex items-center gap-3 px-3 py-2 rounded-xl text-[#00223d] hover:bg-gray-100 dark:hover:bg-zinc-700/60 transition-colors active:scale-98 duration-100">
                    <span class="material-symbols-outlined text-amber-500 dark:text-amber-400 text-xl">search_off</span>
                    <span class="text-sm font-medium font-['Outfit']">Report Missing Item</span>
                </a>

                <!-- Opsi 4: Report Found Item -->
                <a href="lostnfound.html" class="flex items-center gap-3 px-3 py-2 rounded-xl text-[#00223d] hover:bg-gray-100 dark:hover:bg-zinc-700/60 transition-colors active:scale-98 duration-100">
                    <span class="material-symbols-outlined text-indigo-500 dark:text-indigo-400 text-xl">inventory_2</span>
                    <span class="text-sm font-medium font-['Outfit']">Report Found Item</span>
                </a>

                <!-- Garis Pembatas (Divider) -->
                <div class="h-[1px] bg-gray-100 dark:bg-zinc-700/50 my-1"></div>

                <!-- Opsi 5: Emergency Call (Diberi warna merah sebagai prioritas/peringatan) -->
                <a href="tel:112" class="flex items-center gap-3 px-3 py-2 rounded-xl text-[#b80900] hover:bg-red-50 dark:hover:bg-red-950/30 transition-colors active:scale-98 duration-100">
                    <span class="material-symbols-outlined text-[#b80900] text-xl">emergency</span>
                    <span class="text-sm font-semibold font-['Outfit']">Emergency Call</span>
                </a>
            </div>
        </div>
        <a href=" " class="flex flex-col items-center justify-center text-[#00223d] hover:text-[#00223d]/80 transition-all active:scale-90 duration-200" href="#">
            <span class="material-symbols-outlined" data-icon="history">history</span>
            <span class="font-['Outfit'] text-xs mt-0.5">History</span>
        </a>
        <a href="profile.html" class="flex flex-col items-center justify-center text-[#00223d] hover:text-[#00223d]/80 transition-all active:scale-90 duration-200">
            <span class="material-symbols-outlined" data-icon="person">person</span>
            <span class="font-['Outfit'] text-xs mt-0.5">Profile</span>
        </a>
    </nav>

    <!-- Noise overlay -->
    <div class="fixed inset-0 pointer-events-none opacity-[0.02] mix-blend-overlay z-50">
        <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
            <filter id="noiseFilter">
                <feTurbulence baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" type="fractalNoise"></feTurbulence>
            </filter>
            <rect filter="url(#noiseFilter)" height="100%" width="100%"></rect>
        </svg>
    </div>

    <style>
        #add-menu.hide {
            opacity: 0;
            pointer-events: none;
            transform: translateX(-50%) translateY(8px) scale(0.95);
            transition: opacity 0.15s ease, transform 0.15s ease;
        }
        #add-menu.show {
            opacity: 1;
            pointer-events: auto;
            transform: translateX(-50%) translateY(0) scale(1);
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        .popup-arrow {
            position: absolute;
            bottom: -6px;
            left: 50%;
            transform: translateX(-50%) rotate(45deg);
            width: 12px;
            height: 12px;
            border-right: 1px solid #e5e7eb;
            border-bottom: 1px solid #e5e7eb;
        }
    </style>

    <script src="juan.js"></script>

</body>
</html>
