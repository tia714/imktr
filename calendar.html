<script>
// ─── Sample occupied data ────────────────────────────────────────────────────
// Key format: "YYYY-MM-DD"
const occupiedData = {
    // Room bookings
    "2026-07-03": {
        type: "room",
        items: [
            { room: "Kelas A101", time: "08:00 – 10:00" },
            { room: "Lab Komputer 1", time: "13:00 – 15:00" }
        ]
    },
    "2026-07-07": {
        type: "room",
        items: [
            { room: "Auditorium", time: "09:00 – 17:00" }
        ]
    },
    "2026-07-10": {
        type: "tools",
        items: [
            { name: "Proyektor Epson", time: "08:00 – 12:00" },
            { name: "Mikrofon Wireless", time: "08:00 – 12:00" },
            { name: "Tripod Kamera", time: "13:00 – 15:00" }
        ]
    },
    "2026-07-15": {
        type: "room",
        items: [
            { room: "Ruang Seminar", time: "10:00 – 13:00" },
            { room: "Kelas B201", time: "14:00 – 16:00" }
        ]
    },
    "2026-07-20": {
        type: "tools",
        items: [
            { name: "Kamera DSLR", time: "07:00 – 09:00" },
            { name: "Laptop Pinjaman", time: "10:00 – 14:00" }
        ]
    },
    "2026-07-25": {
        type: "room",
        items: [
            { room: "Aula Serbaguna", time: "08:00 – 20:00" }
        ]
    }
};

// ─── State ────────────────────────────────────────────────────────────────────
const today     = new Date();
let viewYear    = today.getFullYear();
let viewMonth   = today.getMonth();   // 0-indexed
let selectedKey = dateKey(today);
let popupTimer  = null;
let monthYearPopupTimeout;
let yearSelectorVal = today.getFullYear();

const MONTH_NAMES = ["January","February","March","April","May","June",
                     "July","August","September","October","November","December"];

function dateKey(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
}

// ─── Render calendar ─────────────────────────────────────────────────────────
function renderCalendar() {
    document.getElementById('monthYearText').textContent =
        `${MONTH_NAMES[viewMonth]} ${viewYear}`;

    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    const firstDay  = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

    // Empty leading cells
    for (let i = 0; i < firstDay; i++) {
        grid.appendChild(Object.assign(document.createElement('div'), {}));
    }

    // Day cells
    for (let d = 1; d <= daysInMonth; d++) {
        const cellDate = new Date(viewYear, viewMonth, d);
        const key      = dateKey(cellDate);
        const isToday  = key === dateKey(today);
        const isSelected = key === selectedKey;
        const isOccupied = !!occupiedData[key];

        const btn = document.createElement('button');
        btn.setAttribute('data-key', key);
        btn.className = [
            'relative flex flex-col items-center justify-center',
            'w-11 h-11 mx-auto text-base font-["Outfit"] font-semibold',
            'transition-all duration-150 active:scale-90',
            isToday    ? 'day-today'    : '',
            !isToday && isSelected ? 'day-selected' : '',
            isOccupied ? 'day-occupied' : '',
            !isToday   ? 'text-on-surface' : '',
            'hover:bg-surface-container-low rounded-full'
        ].join(' ');

        btn.textContent = d;
        btn.onclick = () => selectDate(key, cellDate);
        grid.appendChild(btn);
    }

    renderOccupied(selectedKey);
}

// ─── Select date ─────────────────────────────────────────────────────────────
function selectDate(key, cellDate) {
    selectedKey = key;
    renderCalendar();                  // re-render to update selected ring
    renderOccupied(key);

    if (occupiedData[key]) {
        openPopup(key, cellDate);
    }
}

// ─── Occupied details section ────────────────────────────────────────────────
function renderOccupied(key) {
    const data  = occupiedData[key];
    const title = document.getElementById('occupiedTitle');
    const list  = document.getElementById('occupiedList');

    // Format a nice date string
    const parts = key.split('-');
    const label = `${parseInt(parts[2])} ${MONTH_NAMES[parseInt(parts[1])-1]} ${parts[0]}`;
    title.textContent = `Occupied Details — ${label}`;

    list.innerHTML = '';

    if (!data) {
        list.innerHTML = `
            <div class="bg-white border border-outline-variant/40 rounded-xl p-4 shadow-sm text-center">
                <span class="material-symbols-outlined text-outline text-2xl">event_available</span>
                <p class="font-body-md text-sm text-outline mt-1">No bookings on this date</p>
            </div>`;
        return;
    }

    if (data.type === 'room') {
        data.items.forEach(item => {
            list.innerHTML += `
                <div class="bg-white border-l-4 border-primary rounded-xl p-4 shadow-sm flex items-center justify-between">
                    <div class="space-y-0.5">
                        <p class="font-['Outfit'] text-sm font-bold text-on-surface">${item.room}</p>
                        <p class="text-xs text-outline flex items-center gap-1">
                            <span class="material-symbols-outlined" style="font-size:14px">schedule</span>
                            ${item.time}
                        </p>
                    </div>
                    <span class="text-[11px] bg-primary-container/30 text-primary font-bold px-2.5 py-1 rounded-full">Booked</span>
                </div>`;
        });
    } else {
        data.items.forEach((item, i) => {
            list.innerHTML += `
                <div class="bg-white border-l-4 border-tertiary rounded-xl p-4 shadow-sm flex items-center justify-between">
                    <div class="space-y-0.5">
                        <p class="font-['Outfit'] text-sm font-bold text-on-surface">
                            <span class="text-outline font-normal">#${i+1}</span> ${item.name}
                        </p>
                        <p class="text-xs text-outline flex items-center gap-1">
                            <span class="material-symbols-outlined" style="font-size:14px">schedule</span>
                            ${item.time}
                        </p>
                    </div>
                    <span class="text-[11px] bg-error-container text-on-error-container font-bold px-2.5 py-1 rounded-full">In Use</span>
                </div>`;
        });
    }
}

// ─── Popup ────────────────────────────────────────────────────────────────────
function openPopup(key, cellDate) {
    const data    = occupiedData[key];
    const popup   = document.getElementById('popup');
    const overlay = document.getElementById('popupOverlay');
    const title   = document.getElementById('popupTitle');
    const content = document.getElementById('popupContent');
    const bar     = document.getElementById('popupProgress');

    const parts = key.split('-');
    const label = `${parseInt(parts[2])} ${MONTH_NAMES[parseInt(parts[1])-1]} ${parts[0]}`;
    title.textContent = label;

    content.innerHTML = '';

    if (data.type === 'room') {
        data.items.forEach(item => {
            content.innerHTML += `
                <div class="flex items-start gap-3 py-2 border-b border-outline-variant/40 last:border-0">
                    <span class="material-symbols-outlined text-primary mt-0.5" style="font-size:18px">meeting_room</span>
                    <div>
                        <p class="font-semibold text-on-surface">${item.room}</p>
                        <p class="text-xs text-outline">${item.time}</p>
                    </div>
                </div>`;
        });
    } else {
        data.items.forEach((item, i) => {
            content.innerHTML += `
                <div class="flex items-start gap-3 py-2 border-b border-outline-variant/40 last:border-0">
                    <span class="font-['Outfit'] text-xs font-bold text-white bg-tertiary rounded-full w-5 h-5 flex items-center justify-center flex-shrink-0 mt-0.5">${i+1}</span>
                    <div>
                        <p class="font-semibold text-on-surface">${item.name}</p>
                        <p class="text-xs text-outline">${item.time}</p>
                    </div>
                </div>`;
        });
    }

    // Show popup
    popup.classList.remove('hidden');
    overlay.classList.remove('hidden');
    requestAnimationFrame(() => {
        popup.classList.remove('hidden');
        popup.classList.add('visible');
    });

    // Progress bar countdown
    clearTimeout(popupTimer);
    bar.style.transition = 'none';
    bar.style.width = '100%';
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            bar.style.transition = 'width 15s linear';
            bar.style.width = '0%';
        });
    });

    popupTimer = setTimeout(closePopup, 15000);
}

function closePopup() {
    clearTimeout(popupTimer);
    const popup   = document.getElementById('popup');
    const overlay = document.getElementById('popupOverlay');
    popup.classList.remove('visible');
    popup.classList.add('hidden');
    overlay.classList.add('hidden');
}

// ─── Month navigation ─────────────────────────────────────────────────────────
document.getElementById('prevMonth').onclick = () => {
    if (viewMonth === 0) { viewMonth = 11; viewYear--; }
    else viewMonth--;
    renderCalendar();
};
document.getElementById('nextMonth').onclick = () => {
    if (viewMonth === 11) { viewMonth = 0; viewYear++; }
    else viewMonth++;
    renderCalendar();
};

// ─── Month & Year Selector Popup ──────────────────────────────────────────────
function toggleMonthYearPopup(event) {
    if (event) event.stopPropagation();
    const popup = document.getElementById('month-year-popup');
    const isHidden = popup.classList.contains('hidden');
    
    if (isHidden) {
        popup.classList.remove('hidden');
        yearSelectorVal = viewYear;
        document.getElementById('selected-year-val').textContent = yearSelectorVal;
        renderMonthGrid();
        resetMonthYearPopupTimer();
    } else {
        closeMonthYearPopup();
    }
}

function closeMonthYearPopup() {
    const popup = document.getElementById('month-year-popup');
    if (popup) {
        popup.classList.add('hidden');
    }
    clearTimeout(monthYearPopupTimeout);
}

function resetMonthYearPopupTimer() {
    clearTimeout(monthYearPopupTimeout);
    monthYearPopupTimeout = setTimeout(() => {
        closeMonthYearPopup();
    }, 5000);
}

document.getElementById('month-year-popup').addEventListener('click', (e) => {
    resetMonthYearPopupTimer();
});

function changeYearSelector(offset, event) {
    if (event) event.stopPropagation();
    yearSelectorVal += offset;
    document.getElementById('selected-year-val').textContent = yearSelectorVal;
    renderMonthGrid();
}

function renderMonthGrid() {
    const container = document.getElementById('month-grid-container');
    container.innerHTML = '';
    
    const shortMonths = ["Jan", "Feb", "Mar", "Apr", "May", "Jun", "Jul", "Aug", "Sep", "Oct", "Nov", "Dec"];
    
    shortMonths.forEach((mName, index) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = mName;
        
        const isCurrent = (index === viewMonth && yearSelectorVal === viewYear);
        
        btn.className = isCurrent
            ? "py-2 px-1 text-xs font-bold rounded-xl bg-primary text-white shadow-sm active:scale-95 transition-transform"
            : "py-2 px-1 text-xs font-medium rounded-xl bg-gray-50 hover:bg-gray-100 text-[#00223d] active:scale-95 transition-transform";
            
        btn.onclick = (event) => {
            if (event) event.stopPropagation();
            viewMonth = index;
            viewYear = yearSelectorVal;
            renderCalendar();
            closeMonthYearPopup();
        };
        
        container.appendChild(btn);
    });
}

// ─── Bottom Add Menu Popup Logic ──────────────────────────────────────────────
const addBtn = document.getElementById('add-btn');
const addIcon = document.getElementById('add-icon');
const addMenu = document.getElementById('add-menu');
let autoCloseTimeout;

function toggleMenu(event) {
    event.stopPropagation();

    const isHidden = addMenu.classList.contains('hide');
    if (isHidden) {
        addMenu.classList.remove('hide');
        addMenu.classList.add('show');
        addIcon.style.transform = 'rotate(135deg)';

        clearTimeout(autoCloseTimeout);
        autoCloseTimeout = setTimeout(closeMenu, 10000);
    } else {
        closeMenu();
    }
}

function closeMenu() {
    addMenu.classList.remove('show');
    addMenu.classList.add('hide');
    addIcon.style.transform = 'rotate(0deg)';
    clearTimeout(autoCloseTimeout);
}

addBtn.addEventListener('click', toggleMenu);

document.addEventListener('click', (event) => {
    const isClickInside = addMenu.contains(event.target) || addBtn.contains(event.target);
    if (!isClickInside) {
        closeMenu();
    }

    // Close Month Year Popup when clicking outside
    const myPopup = document.getElementById('month-year-popup');
    const myHeader = document.getElementById('monthYear');
    if (myPopup && !myPopup.classList.contains('hidden')) {
        const clickInsideMy = myPopup.contains(event.target) || myHeader.contains(event.target);
        if (!clickInsideMy) {
            closeMonthYearPopup();
        }
    }
});

document.addEventListener('keydown', (event) => {
    if (event.key === 'Escape') {
        closeMenu();
        closeMonthYearPopup();
    }
});

// ─── Init ─────────────────────────────────────────────────────────────────────
renderCalendar();
</script>
