<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>SARPRAS FTI</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <link rel="stylesheet" href="styles.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link href="https://fonts.googleapis.com/css2?family=Alegreya:wght@400..900&family=League+Spartan&family=Outfit:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">

    <script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    "colors": {
                        "surface-container-high": "#edf4ff",
                        "on-primary-fixed": "#001221",
                        "on-tertiary-fixed-variant": "#c80a00",
                        "secondary-fixed-dim": "#ffb01f",
                        "on-secondary-fixed": "#001221",
                        "surface-dim": "#d3e4ff",
                        "secondary": "#ffb01f",
                        "primary-fixed-dim": "#ffb01f",
                        "secondary-container": "#ffb01f",
                        "primary": "#003765",
                        "on-secondary-fixed-variant": "#001221",
                        "on-primary-container": "#ffffff",
                        "tertiary": "#c80a00",
                        "outline": "#737780",
                        "on-background": "#001221",
                        "on-error": "#ffffff",
                        "secondary-fixed": "#ffb01f",
                        "surface-tint": "#003765",
                        "on-tertiary-fixed": "#001221",
                        "on-surface-variant": "#001221",
                        "tertiary-fixed": "#c80a00",
                        "tertiary-container": "#c80a00",
                        "primary-container": "#003765",
                        "surface": "#f7f9ff",
                        "inverse-surface": "#001221",
                        "on-error-container": "#93000a",
                        "tertiary-fixed-dim": "#c80a00",
                        "inverse-primary": "#ffb01f",
                        "surface-variant": "#d3e4ff",
                        "surface-container-low": "#f0f5ff",
                        "on-surface": "#001221",
                        "error": "#ba1a1a",
                        "on-secondary": "#001221",
                        "outline-variant": "#c3c6d0",
                        "on-secondary-container": "#001221",
                        "error-container": "#ffdad6",
                        "surface-container-highest": "#d3e4ff",
                        "inverse-on-surface": "#ffffff",
                        "primary-fixed": "#003765",
                        "on-primary-fixed-variant": "#ffffff",
                        "surface-container": "#e2efff",
                        "surface-bright": "#ffffff",
                        "background": "#ffffff",
                        "surface-container-lowest": "#ffffff",
                        "on-tertiary-container": "#ffffff",
                        "on-primary": "#ffffff",
                        "on-tertiary": "#ffffff"
                    },
                    "borderRadius": {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                    "spacing": {
                        "sm": "8px",
                        "md": "16px",
                        "edge-margin": "16px",
                        "lg": "24px",
                        "base": "4px",
                        "xl": "32px",
                        "xs": "4px",
                        "gutter": "12px"
                    },
                    "fontFamily": {
                        "headline-lg": ["Outfit"],
                        "label-md": ["Alegreya"],
                        "body-md": ["League Spartan"],
                        "headline-lg-mobile": ["Outfit"],
                        "label-sm": ["Alegreya"],
                        "headline-md": ["Outfit"],
                        "body-lg": ["League Spartan"]
                    },
                    "fontSize": {
                        "headline-lg": ["30px", {"lineHeight": "38px", "letterSpacing": "-0.02em", "fontWeight": "700"}],
                        "label-md": ["12px", {"lineHeight": "16px", "letterSpacing": "0.05em", "fontWeight": "600"}],
                        "body-md": ["14px", {"lineHeight": "20px", "fontWeight": "400"}],
                        "headline-lg-mobile": ["24px", {"lineHeight": "32px", "letterSpacing": "-0.01em", "fontWeight": "700"}],
                        "label-sm": ["11px", {"lineHeight": "14px", "fontWeight": "500"}],
                        "headline-md": ["20px", {"lineHeight": "28px", "fontWeight": "600"}],
                        "body-lg": ["16px", {"lineHeight": "24px", "fontWeight": "400"}]
                    }
                }
            }
        }
    </script>

    <style>
        /* Today circle */
        .day-today {
            background-color: #003765;
            color: #ffffff !important;
            border-radius: 9999px;
        }
        /* Selected circle */
        .day-selected {
            outline: 2px solid #003765;
            border-radius: 9999px;
            color: #003765;
            font-weight: 700;
        }
        /* Dot indicator for occupied days */
        .day-occupied::after {
            content: '';
            display: block;
            width: 5px;
            height: 5px;
            border-radius: 9999px;
            background-color: #c80a00;
            margin: 2px auto 0;
        }
        /* Popup animation */
        #popup {
            transition: opacity 0.2s ease, transform 0.2s ease;
        }
        #popup.hidden {
            opacity: 0;
            pointer-events: none;
            transform: translateY(8px);
        }
        #popup.visible {
            opacity: 1;
            pointer-events: auto;
            transform: translateY(0);
        }
    </style>
</head>

<body class="bg-surface text-on-surface min-h-screen pb-28">

<!-- Fixed Header -->
<header class="fixed top-0 w-full z-50 bg-white border-b border-outline-variant/30 shadow-sm flex items-center h-16">
    <div class="w-full px-edge-margin flex items-center justify-between">
        <h1 class="font-headline-md text-xl font-bold text-primary">Schedule & Booking</h1>
    </div>
</header>

<!-- Main -->
<main class="pt-20 pb-28 px-edge-margin space-y-6">

    <!-- Calendar Card -->
    <div class="bg-white border border-outline-variant/40 rounded-2xl p-4 shadow-sm">

        <!-- Month navigation -->
        <div class="flex items-center justify-between mb-4">
            <button id="prevMonth" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-surface-container-low active:scale-90 transition-all">
                <span class="material-symbols-outlined text-primary">chevron_left</span>
            </button>
            <h2 id="monthYear" class="font-['Outfit'] font-bold text-base text-primary"></h2>
            <button id="nextMonth" class="w-9 h-9 flex items-center justify-center rounded-full hover:bg-surface-container-low active:scale-90 transition-all">
                <span class="material-symbols-outlined text-primary">chevron_right</span>
            </button>
        </div>

        <!-- Day headers -->
        <div class="grid grid-cols-7 mb-1">
            <div class="text-center font-['Outfit'] text-xs font-semibold text-outline py-1">Sun</div>
            <div class="text-center font-['Outfit'] text-xs font-semibold text-outline py-1">Mon</div>
            <div class="text-center font-['Outfit'] text-xs font-semibold text-outline py-1">Tue</div>
            <div class="text-center font-['Outfit'] text-xs font-semibold text-outline py-1">Wed</div>
            <div class="text-center font-['Outfit'] text-xs font-semibold text-outline py-1">Thu</div>
            <div class="text-center font-['Outfit'] text-xs font-semibold text-outline py-1">Fri</div>
            <div class="text-center font-['Outfit'] text-xs font-semibold text-outline py-1">Sat</div>
        </div>

        <!-- Day grid -->
        <div id="calendarGrid" class="grid grid-cols-7 gap-y-1"></div>
    </div>

    <!-- Occupied Details section -->
    <div id="occupiedSection" class="space-y-3">
        <h3 id="occupiedTitle" class="font-headline-md text-base font-bold text-primary px-1">Occupied Details</h3>
        <div id="occupiedList" class="space-y-2"></div>
    </div>

</main>

<!-- Popup overlay -->
<div id="popupOverlay" class="fixed inset-0 z-40 hidden" onclick="closePopup()"></div>

<!-- Popup -->
<div id="popup" class="hidden fixed z-50 left-1/2 -translate-x-1/2 w-[calc(100%-2rem)] max-w-sm bg-white border border-outline-variant rounded-2xl shadow-2xl p-5 space-y-3" style="bottom: 90px;">
    <div class="flex items-center justify-between">
        <h4 id="popupTitle" class="font-['Outfit'] font-bold text-base text-primary"></h4>
        <button onclick="closePopup()" class="w-7 h-7 flex items-center justify-center rounded-full hover:bg-surface-container-low">
            <span class="material-symbols-outlined text-outline text-sm">close</span>
        </button>
    </div>
    <div id="popupContent" class="space-y-2 text-sm"></div>
    <!-- auto-close progress bar -->
    <div class="h-1 w-full bg-outline-variant rounded-full overflow-hidden">
        <div id="popupProgress" class="h-1 bg-primary rounded-full" style="width:100%; transition: width 15s linear;"></div>
    </div>
</div>

<!-- Bottom Nav -->
<nav class="fixed bottom-0 w-full z-50 bg-surface dark:bg-surface-dim border-t border-outline-variant shadow-lg flex justify-around items-center h-16 pb-safe px-2">
    <a href="home.html" class="flex flex-col items-center justify-center text-[#001221] opacity-75 transition-all active:scale-90 duration-200">
        <span class="material-symbols-outlined">home</span>
        <span class="font-['Outfit'] text-xs mt-0.5">Home</span>
    </a>
    <a href="calendar.html" class="flex flex-col items-center justify-center text-[#ffb01f] font-bold transition-all active:scale-90 duration-200">
        <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">calendar_month</span>
        <span class="font-['Outfit'] text-xs mt-0.5">Schedule</span>
    </a>
    <a class="flex flex-col items-center justify-center text-[#001221] opacity-75 transition-all active:scale-90 duration-200" href="#">
        <span class="material-symbols-outlined">history</span>
        <span class="font-['Outfit'] text-xs mt-0.5">History</span>
    </a>
    <a href="profile.html" class="flex flex-col items-center justify-center text-[#001221] opacity-75 transition-all active:scale-90 duration-200">
        <span class="material-symbols-outlined">person</span>
        <span class="font-['Outfit'] text-xs mt-0.5">Profile</span>
    </a>
</nav>

<!-- Noise overlay -->
<div class="fixed inset-0 pointer-events-none opacity-[0.02] mix-blend-overlay z-[60]">
    <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <filter id="noiseFilter">
            <feTurbulence baseFrequency="0.65" numOctaves="3" stitchTiles="stitch" type="fractalNoise"></feTurbulence>
        </filter>
        <rect filter="url(#noiseFilter)" height="100%" width="100%"></rect>
    </svg>
</div>

<script>
// ─── Sample occupied data ────────────────────────────────────────────────────
// Key format: "YYYY-MM-DD"
const occupiedData = {
    // Room bookings
    "2026-07-03": {
        type: "room",
        items: [
            { room: "Kelas A101", time: "08:00 – 10:00" },
            { room: "Lab Komputer 1", time: "13:00 – 15:00" }
        ]
    },
    "2026-07-07": {
        type: "room",
        items: [
            { room: "Auditorium", time: "09:00 – 17:00" }
        ]
    },
    "2026-07-10": {
        type: "tools",
        items: [
            { name: "Proyektor Epson", time: "08:00 – 12:00" },
            { name: "Mikrofon Wireless", time: "08:00 – 12:00" },
            { name: "Tripod Kamera", time: "13:00 – 15:00" }
        ]
    },
    "2026-07-15": {
        type: "room",
        items: [
            { room: "Ruang Seminar", time: "10:00 – 13:00" },
            { room: "Kelas B201", time: "14:00 – 16:00" }
        ]
    },
    "2026-07-20": {
        type: "tools",
        items: [
            { name: "Kamera DSLR", time: "07:00 – 09:00" },
            { name: "Laptop Pinjaman", time: "10:00 – 14:00" }
        ]
    },
    "2026-07-25": {
        type: "room",
        items: [
            { room: "Aula Serbaguna", time: "08:00 – 20:00" }
        ]
    }
};

// ─── State ────────────────────────────────────────────────────────────────────
const today     = new Date();
let viewYear    = today.getFullYear();
let viewMonth   = today.getMonth();   // 0-indexed
let selectedKey = dateKey(today);
let popupTimer  = null;

const MONTH_NAMES = ["January","February","March","April","May","June",
                     "July","August","September","October","November","December"];

function dateKey(d) {
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}-${m}-${day}`;
}

// ─── Render calendar ─────────────────────────────────────────────────────────
function renderCalendar() {
    document.getElementById('monthYear').textContent =
        `${MONTH_NAMES[viewMonth]} ${viewYear}`;

    const grid = document.getElementById('calendarGrid');
    grid.innerHTML = '';

    const firstDay  = new Date(viewYear, viewMonth, 1).getDay(); // 0=Sun
    const daysInMonth = new Date(viewYear, viewMonth + 1, 0).getDate();

    // Empty leading cells
    for (let i = 0; i < firstDay; i++) {
        grid.appendChild(Object.assign(document.createElement('div'), {}));
    }

    // Day cells
    for (let d = 1; d <= daysInMonth; d++) {
        const cellDate = new Date(viewYear, viewMonth, d);
        const key      = dateKey(cellDate);
        const isToday  = key === dateKey(today);
        const isSelected = key === selectedKey;
        const isOccupied = !!occupiedData[key];

        const btn = document.createElement('button');
        btn.setAttribute('data-key', key);
        btn.className = [
            'relative flex flex-col items-center justify-center',
            'w-9 h-9 mx-auto text-sm font-["Outfit"] font-medium',
            'transition-all duration-150 active:scale-90',
            isToday    ? 'day-today'    : '',
            !isToday && isSelected ? 'day-selected' : '',
            isOccupied ? 'day-occupied' : '',
            !isToday   ? 'text-on-surface' : '',
            'hover:bg-surface-container-low rounded-full'
        ].join(' ');

        btn.textContent = d;
        btn.onclick = () => selectDate(key, cellDate);
        grid.appendChild(btn);
    }

    renderOccupied(selectedKey);
}

// ─── Select date ─────────────────────────────────────────────────────────────
function selectDate(key, cellDate) {
    selectedKey = key;
    renderCalendar();                  // re-render to update selected ring
    renderOccupied(key);

    if (occupiedData[key]) {
        openPopup(key, cellDate);
    }
}

// ─── Occupied details section ────────────────────────────────────────────────
function renderOccupied(key) {
    const data  = occupiedData[key];
    const title = document.getElementById('occupiedTitle');
    const list  = document.getElementById('occupiedList');

    // Format a nice date string
    const parts = key.split('-');
    const label = `${parseInt(parts[2])} ${MONTH_NAMES[parseInt(parts[1])-1]} ${parts[0]}`;
    title.textContent = `Occupied Details — ${label}`;

    list.innerHTML = '';

    if (!data) {
        list.innerHTML = `
            <div class="bg-white border border-outline-variant/40 rounded-xl p-4 shadow-sm text-center">
                <span class="material-symbols-outlined text-outline text-2xl">event_available</span>
                <p class="font-body-md text-sm text-outline mt-1">No bookings on this date</p>
            </div>`;
        return;
    }

    if (data.type === 'room') {
        data.items.forEach(item => {
            list.innerHTML += `
                <div class="bg-white border-l-4 border-primary rounded-xl p-4 shadow-sm flex items-center justify-between">
                    <div class="space-y-0.5">
                        <p class="font-['Outfit'] text-sm font-bold text-on-surface">${item.room}</p>
                        <p class="text-xs text-outline flex items-center gap-1">
                            <span class="material-symbols-outlined" style="font-size:14px">schedule</span>
                            ${item.time}
                        </p>
                    </div>
                    <span class="text-[11px] bg-primary-container/30 text-primary font-bold px-2.5 py-1 rounded-full">Booked</span>
                </div>`;
        });
    } else {
        data.items.forEach((item, i) => {
            list.innerHTML += `
                <div class="bg-white border-l-4 border-tertiary rounded-xl p-4 shadow-sm flex items-center justify-between">
                    <div class="space-y-0.5">
                        <p class="font-['Outfit'] text-sm font-bold text-on-surface">
                            <span class="text-outline font-normal">#${i+1}</span> ${item.name}
                        </p>
                        <p class="text-xs text-outline flex items-center gap-1">
                            <span class="material-symbols-outlined" style="font-size:14px">schedule</span>
                            ${item.time}
                        </p>
                    </div>
                    <span class="text-[11px] bg-error-container text-on-error-container font-bold px-2.5 py-1 rounded-full">In Use</span>
                </div>`;
        });
    }
}

// ─── Popup ────────────────────────────────────────────────────────────────────
function openPopup(key, cellDate) {
    const data    = occupiedData[key];
    const popup   = document.getElementById('popup');
    const overlay = document.getElementById('popupOverlay');
    const title   = document.getElementById('popupTitle');
    const content = document.getElementById('popupContent');
    const bar     = document.getElementById('popupProgress');

    const parts = key.split('-');
    const label = `${parseInt(parts[2])} ${MONTH_NAMES[parseInt(parts[1])-1]} ${parts[0]}`;
    title.textContent = label;

    content.innerHTML = '';

    if (data.type === 'room') {
        data.items.forEach(item => {
            content.innerHTML += `
                <div class="flex items-start gap-3 py-2 border-b border-outline-variant/40 last:border-0">
                    <span class="material-symbols-outlined text-primary mt-0.5" style="font-size:18px">meeting_room</span>
                    <div>
                        <p class="font-semibold text-on-surface">${item.room}</p>
                        <p class="text-xs text-outline">${item.time}</p>
                    </div>
                </div>`;
        });
    } else {
        data.items.forEach((item, i) => {
            content.innerHTML += `
                <div class="flex items-start gap-3 py-2 border-b border-outline-variant/40 last:border-0">
                    <span class="font-['Outfit'] text-xs font-bold text-white bg-tertiary rounded-full w-5 h-5 flex items-center justify-center flex-shrink-0 mt-0.5">${i+1}</span>
                    <div>
                        <p class="font-semibold text-on-surface">${item.name}</p>
                        <p class="text-xs text-outline">${item.time}</p>
                    </div>
                </div>`;
        });
    }

    // Show popup
    popup.classList.remove('hidden');
    overlay.classList.remove('hidden');
    requestAnimationFrame(() => {
        popup.classList.remove('hidden');
        popup.classList.add('visible');
    });

    // Progress bar countdown
    clearTimeout(popupTimer);
    bar.style.transition = 'none';
    bar.style.width = '100%';
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            bar.style.transition = 'width 15s linear';
            bar.style.width = '0%';
        });
    });

    popupTimer = setTimeout(closePopup, 15000);
}

function closePopup() {
    clearTimeout(popupTimer);
    const popup   = document.getElementById('popup');
    const overlay = document.getElementById('popupOverlay');
    popup.classList.remove('visible');
    popup.classList.add('hidden');
    overlay.classList.add('hidden');
}

// ─── Month navigation ─────────────────────────────────────────────────────────
document.getElementById('prevMonth').onclick = () => {
    if (viewMonth === 0) { viewMonth = 11; viewYear--; }
    else viewMonth--;
    renderCalendar();
};
document.getElementById('nextMonth').onclick = () => {
    if (viewMonth === 11) { viewMonth = 0; viewYear++; }
    else viewMonth++;
    renderCalendar();
};

// ─── Init ─────────────────────────────────────────────────────────────────────
renderCalendar();
</script>

</body>
</html>
